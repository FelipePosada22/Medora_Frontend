<div class="page">

  <div class="page__header">
    <div>
      <h1 class="page__title">Nueva Cita</h1>
      <p class="page__subtitle">Programa una cita para un paciente</p>
    </div>
    <app-button variant="secondary" size="sm" [routerLink]="['/appointments']">← Volver</app-button>
  </div>

  @if (vm.errorMessage()) {
    <div class="alert alert--error">{{ vm.errorMessage() }}</div>
  }

  @if (vm.isLoading()) {
    <div class="state-placeholder">Cargando datos...</div>
  } @else {
    <form [formGroup]="vm.form" (ngSubmit)="vm.submit()">
      <div style="display:flex; flex-direction:column; gap:var(--space-4)">

        <!-- Main fields -->
        <app-card>
          <p style="font-size:var(--font-size-base); font-weight:var(--font-weight-semibold); margin-bottom:var(--space-4)">Información de la cita</p>
          <div class="form-grid">

            <div class="form-field">
              <label class="form-label">Paciente</label>
              <select class="form-select" formControlName="patientId">
                <option value="" disabled>Seleccionar paciente</option>
                @for (p of vm.patients(); track p.id) {
                  <option [value]="p.id">{{ p.name }}</option>
                }
              </select>
            </div>

            <div class="form-field">
              <label class="form-label">Tipo de servicio</label>
              <select class="form-select" formControlName="appointmentTypeId">
                <option value="" disabled>Seleccionar servicio</option>
                @for (t of vm.appointmentTypes(); track t.id) {
                  <option [value]="t.id">{{ t.name }}</option>
                }
              </select>
            </div>

            <div class="form-field">
              <label class="form-label">Profesional</label>
              <select class="form-select" formControlName="professionalId">
                <option value="" disabled>Seleccionar profesional</option>
                @for (p of vm.professionals(); track p.id) {
                  <option [value]="p.id">{{ p.name }} — {{ p.specialty }}</option>
                }
              </select>
            </div>

            <div class="form-field">
              <label class="form-label">Fecha</label>
              <input class="form-select" type="date" formControlName="date" />
            </div>

            <div class="form-field">
              <label class="form-label">Hora de inicio</label>
              <input class="form-select" type="time" formControlName="startTime" />
            </div>

            <div class="form-field">
              <label class="form-label">Hora de fin</label>
              <input class="form-select" type="time" formControlName="endTime" />
            </div>

          </div>
        </app-card>

        <!-- Notes -->
        <app-card>
          <div class="form-field">
            <label class="form-label">Notas (opcional)</label>
            <textarea class="form-textarea" formControlName="notes" placeholder="Observaciones o indicaciones previas..."></textarea>
          </div>
        </app-card>

        <!-- Actions -->
        <div class="form-actions">
          <app-button variant="secondary" type="button" [routerLink]="['/appointments']">Cancelar</app-button>
          <app-button variant="primary" type="submit" [loading]="vm.isSubmitting()">Confirmar cita</app-button>
        </div>

      </div>
    </form>
  }

</div>
